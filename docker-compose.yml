services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: contract
      POSTGRES_USER: user_admin
      POSTGRES_PASSWORD: password_admin
    ports:
      - "5431:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - '6380:6379'
    volumes:
      - redis_data:/data

  rabbitmq:
    image: rabbitmq:4-management
    ports:
      - '5672:5672'
      - '15672:15672'
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
